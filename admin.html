<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <header class="admin-header">

        <h1>
            Admin Dashboard
        </h1>

        <button id="logoutBtn">
            Logout
        </button>

    </header>

    <main class="admin-container">

        <section class="upload-section">

            <h2>
                Upload Video
            </h2>

            <form id="uploadForm">

                <input type="text" id="title" placeholder="Video Title" required>

                <input
                    type="text"
                    id="category"
                    placeholder="Category">

                <textarea id="description" placeholder="Video Description">
            </textarea>

                <label>

                    Thumbnail

                </label>

                <input type="file" id="thumbnail" accept="image/*" required>

                <label>

                    Video File

                </label>

                <input type="file" id="video" accept="video/*" required>

                <label>

                    Preview Start (seconds)

                </label>

                <input type="number" id="previewStart" min="0" value="0">

                <label>

                    Preview End (seconds)

                </label>

                <input type="number" id="previewEnd" min="1" value="30">

                <button type="submit">

                    Upload Video

                </button>

            </form>

            <p id="uploadStatus"></p>

        </section>

        <section class="videos-section">

            <h2>
                Uploaded Videos
            </h2>

            <div id="videoList">

            </div>

        </section>

    </main>
<script type="module" src="js/admin-guard.js">
</script>

<script type="module" src="js/admin.js">
</script>

   

</body>

</html>
