<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <div class="auth-container">

        ```
        <div class="auth-card">

            <h1>

                Login

            </h1>

            <form id="loginForm">

                <input type="email" id="email" placeholder="Email" required>

                <input type="password" id="password" placeholder="Password" required>

                <button type="submit">

                    Login

                </button>

            </form>

            <p id="message"></p>

            <a href="signup.html">

                Don't have an account?
                Sign Up

            </a>

        </div>
        ```

    </div>

    <script type="module">

        import { supabase }
            from './js/supabase.js'

        const form =
            document.getElementById(
                'loginForm'
            )

        const message =
            document.getElementById(
                'message'
            )

        form.addEventListener(
            'submit',
            async (e) => {

                e.preventDefault()

                const email =
                    document.getElementById(
                        'email'
                    ).value

                const password =
                    document.getElementById(
                        'password'
                    ).value

                const {
                    data,
                    error
                }
                    =
                    await supabase.auth.signInWithPassword({
                        email,
                        password
                    })

                if (error) {

                    message.innerText =
                        error.message

                    return
                }

                window.location.href =
                    'index.html'

            })
    </script>

</body>

</html>
