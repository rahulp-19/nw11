<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <div class="auth-container">

        ```
        <div class="auth-card">

            <h1>

                Create Account

            </h1>

            <form id="signupForm">

                <input type="email" id="email" placeholder="Email" required>

                <input type="password" id="password" placeholder="Password" required>

                <button type="submit">

                    Sign Up

                </button>

            </form>

            <p id="message"></p>

            <a href="login.html">

                Already have an account?
                Login

            </a>

        </div>
        ```

    </div>

    <script type="module">

        import { supabase }
            from './js/supabase.js'

        const form =
            document.getElementById(
                'signupForm'
            )

        const message =
            document.getElementById(
                'message'
            )

        form.addEventListener(
            'submit',
            async (e) => {

                e.preventDefault()

                const email =
                    document.getElementById(
                        'email'
                    ).value

                const password =
                    document.getElementById(
                        'password'
                    ).value

                const {
                    data,
                    error
                }
                    =
                    await supabase.auth.signUp({
                        email,
                        password
                    })

                if (error) {

                    message.innerText =
                        error.message

                    return
                }

                message.classList.add(
                    'success'
                )

                message.innerText =
                    'Account created successfully. Please login.'

                setTimeout(() => {

                    window.location.href =
                        'login.html'

                }, 2000)

            })
    </script>

</body>

</html>
