<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Watch Video</title>

    <link rel="stylesheet" href="css/player.css">

</head>

<body>

    <div class="player-container">

        ```
        <div class="video-wrapper">

            <video id="videoPlayer" controls playsinline>

            </video>

        </div>

        <div class="video-details">

            <h1 id="videoTitle">

                Loading...

            </h1>

            <p id="videoDescription">

            </p>

        </div>
        ```

    </div>

    <div id="subscriptionModal" class="modal">

        ```
        <div class="modal-content">

            <h2>

                Subscribe To Continue

            </h2>

            <p>

                Your preview has ended.

                Subscribe to unlock the full video.

            </p>

            <button id="subscribeBtn">

                Subscribe

            </button>

            <button id="closeModal">

                Close

            </button>

        </div>
        ```

    </div>

    <script type="module">

       import { supabase }
            from './js/supabase.js'

        import { hasActiveSubscription }
            from './js/subscription-check.js'

        import {
            saveProgress,
            getProgress
        }
            from './js/watch-history.js'

        const params =
            new URLSearchParams(
                window.location.search
            )

        const videoId =
            params.get('id')

        const player =
            document.getElementById(
                'videoPlayer'
            )

        const title =
            document.getElementById(
                'videoTitle'
            )

        const description =
            document.getElementById(
                'videoDescription'
            )

        const modal =
            document.getElementById(
                'subscriptionModal'
            )

        async function loadVideo() {

            const {
                data,
                error
            }
                =
                await supabase
                    .from('videos')
                    .select('*')
                    .eq('id', videoId)
                    .single()

            if (error) {

                console.error(error)

                return
            }

            title.innerText =
                data.title

            description.innerText =
                data.description || ''

            player.src =
                data.video_url

            const lastPosition =
            await getProgress(videoId)

            player.addEventListener(
                'loadedmetadata',
                () => {

                    if(lastPosition > 0){

                        player.currentTime =
                        lastPosition

                    }else{

                        player.currentTime =
                        data.preview_start || 0

                    }

                })

       const subscribed =
                await hasActiveSubscription()

            if (!subscribed) {

                player.addEventListener(
                    'timeupdate',
                    () => {

                        const previewEnd =
                            data.preview_end || 30

                        if (
                            player.currentTime >= previewEnd
                        ) {

                            player.pause()

                            modal.classList.add(
                                'show'
                            )

                        }

                    })

            }

        }

        document
            .getElementById(
                'closeModal'
            )
            .onclick = () => {

                modal.classList.remove(
                    'show'
                )

            }

        document
            .getElementById(
                'subscribeBtn'
            )
            .onclick = () => {

                window.location.href =
                    'plans.html'

            }

        setInterval(()=>{

            if(
                !player.paused
            ){

                saveProgress(
                    videoId,
                    player.currentTime
                )

            }

        },10000)

        loadVideo()

    </script>

</body>

</html>
